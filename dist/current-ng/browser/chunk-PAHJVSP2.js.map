<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light">
    <div class="card shadow-sm" style="width: 380px;">
        <div class="card-body p-4">
            <h4 class="fw-bold mb-1 text-center">CENEFCO Admin</h4>
            <p class="text-muted text-center small mb-4">Panel de administración</p>

            @if (error) {
                <div class="alert alert-danger py-2 small">{{ error }}</div>
            }

            <form (ngSubmit)="login()">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Correo electrónico</label>
                    <input type="email" class="form-control" [(ngModel)]="email" name="email" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Contraseña</label>
                    <input type="password" class="form-control" [(ngModel)]="password" name="password" required>
                </div>
                <button type="submit" class="btn btn-danger w-100 fw-semibold" [disabled]="loading">
                    @if (loading) {
                        <span class="spinner-border spinner-border-sm me-2"></span>
                    }
                    Ingresar
                </button>
            </form>
        </div>
    </div>
</div>
